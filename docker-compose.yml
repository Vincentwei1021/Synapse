services:
  app:
    image: vincentwei1021/synapse:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://synapse:synapse@db:5432/synapse
      - REDIS_URL=redis://default:synapse-redis@redis:6379
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-synapse-docker-secret-change-in-production}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - DEFAULT_USER=${DEFAULT_USER:-}
      - DEFAULT_PASSWORD=${DEFAULT_PASSWORD:-}
    volumes:
      - ${SYNAPSE_DATA_DIR:-./data/synapse}:/root/.synapse
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass synapse-redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "synapse-redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: synapse
      POSTGRES_DB: synapse
    ports:
      - "5433:5432"
    volumes:
      - synapse-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapse"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  synapse-data:
  redis-data:
