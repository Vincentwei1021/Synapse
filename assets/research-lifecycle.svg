<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 355" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#666" />
    </marker>
    <marker id="arr-loop" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#1a6b4a" />
    </marker>
    <marker id="arr-back" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6b4a1a" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1120" height="355" fill="#faf8f5" rx="8" />

  <!-- Title -->
  <text x="560" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#2a2a2a">Synapse Research Lifecycle</text>

  <!-- === Boxes === -->

  <!-- 1. Research Project — warm slate -->
  <rect x="30" y="165" width="155" height="50" rx="8" fill="#dfe0e6" stroke="#a0a4b4" stroke-width="1.2" />
  <text x="107" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#3a3d4a">Research Project</text>

  <!-- 2. Literature Review — emerald green -->
  <rect x="255" y="165" width="140" height="50" rx="8" fill="#b4f0c8" stroke="#4cbe7c" stroke-width="1.2" />
  <text x="325" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a6b3a">Literature Review</text>

  <!-- 3. Research Questions — violet -->
  <rect x="465" y="165" width="150" height="50" rx="8" fill="#d8c4f4" stroke="#9470d0" stroke-width="1.2" />
  <text x="540" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#5a2e9a">Research Questions</text>

  <!-- 4. Experiments — sky blue -->
  <rect x="685" y="165" width="130" height="50" rx="8" fill="#b0d8f8" stroke="#4a9ee0" stroke-width="1.2" />
  <text x="750" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a5a9a">Experiments</text>

  <!-- 5. Analysis &amp; Report — warm amber -->
  <rect x="885" y="165" width="145" height="50" rx="8" fill="#f8d8a8" stroke="#d0a040" stroke-width="1.2" />
  <text x="957" y="195" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5010">Analysis &amp; Report</text>

  <!-- === Forward arrows === -->

  <!-- 1 → 2 -->
  <line x1="185" y1="190" x2="251" y2="190" stroke="#666" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- 2 → 3 -->
  <line x1="395" y1="190" x2="461" y2="190" stroke="#666" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- 3 → 4 -->
  <line x1="615" y1="190" x2="681" y2="190" stroke="#666" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- 4 → 5 -->
  <line x1="815" y1="190" x2="881" y2="190" stroke="#666" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- === Self-loop on Experiments (Autonomous loop) — simple rectangular === -->
  <path d="M770,165 L770,120 L730,120 L730,161"
        fill="none" stroke="#1a6b4a" stroke-width="1.5" marker-end="url(#arr-loop)" />
  <text x="750" y="112" text-anchor="middle" font-size="11" fill="#1a6b4a">Autonomous loop</text>

  <!-- === Feedback: Analysis &amp; Report → Research Questions (solid, above) === -->
  <path d="M957,165 L957,72 L540,72 L540,161"
        fill="none" stroke="#6b4a1a" stroke-width="1.5" marker-end="url(#arr-back)" />
  <text x="748" y="64" text-anchor="middle" font-size="11" fill="#6b4a1a">New RQs from findings</text>

  <!-- === Human Oversight Layer === -->
  <rect x="30" y="248" width="1060" height="88" rx="10" fill="#e8f0f0" fill-opacity="0.6" stroke="#508080" stroke-width="2" stroke-dasharray="8,4" />

  <!-- Icon + Title -->
  <text x="560" y="272" text-anchor="middle" font-size="14" font-weight="bold" fill="#3a6868">&#x1F464;  Human Oversight Layer</text>

  <!-- Oversight boxes — 4 boxes evenly distributed -->
  <rect x="148" y="284" width="120" height="40" rx="6" fill="#d0e4e4" stroke="#6a9e9e" stroke-width="1" />
  <text x="208" y="308" text-anchor="middle" font-size="11" font-weight="600" fill="#2a5858">Steers RQ</text>

  <rect x="370" y="284" width="120" height="40" rx="6" fill="#d0e4e4" stroke="#6a9e9e" stroke-width="1" />
  <text x="430" y="301" text-anchor="middle" font-size="11" font-weight="600" fill="#2a5858">Approves</text>
  <text x="430" y="315" text-anchor="middle" font-size="11" font-weight="600" fill="#2a5858">experiments</text>

  <rect x="592" y="284" width="120" height="40" rx="6" fill="#d0e4e4" stroke="#6a9e9e" stroke-width="1" />
  <text x="652" y="301" text-anchor="middle" font-size="11" font-weight="600" fill="#2a5858">Reviews</text>
  <text x="652" y="315" text-anchor="middle" font-size="11" font-weight="600" fill="#2a5858">results</text>

  <rect x="814" y="284" width="120" height="40" rx="6" fill="#d0e4e4" stroke="#6a9e9e" stroke-width="1" />
  <text x="874" y="301" text-anchor="middle" font-size="11" font-weight="600" fill="#2a5858">Final</text>
  <text x="874" y="315" text-anchor="middle" font-size="11" font-weight="600" fill="#2a5858">judgment</text>

</svg>
